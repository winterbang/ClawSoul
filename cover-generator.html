<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSoul 封面生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        #canvas {
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }
        .download-btn {
            margin-top: 20px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1200" height="630"></canvas>
    <button class="download-btn" onclick="downloadImage()">下载封面图片</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function drawCover() {
            const width = 1200;
            const height = 630;
            const centerX = width / 2;
            const centerY = height / 2 - 20;
            
            // 深色渐变背景
            const bgGradient = ctx.createLinearGradient(0, 0, width, height);
            bgGradient.addColorStop(0, '#0a0a0f');
            bgGradient.addColorStop(0.5, '#1a1a2e');
            bgGradient.addColorStop(1, '#0f0f1a');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 网格背景
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // 中心发光球体 - AI灵魂核心
            const coreRadius = 80;
            
            // 外发光
            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreRadius * 2.5);
            glowGradient.addColorStop(0, 'rgba(0, 212, 255, 0.4)');
            glowGradient.addColorStop(0.3, 'rgba(168, 85, 247, 0.2)');
            glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreRadius * 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // 核心球体
            const coreGradient = ctx.createRadialGradient(centerX - 20, centerY - 20, 0, centerX, centerY, coreRadius);
            coreGradient.addColorStop(0, '#00d4ff');
            coreGradient.addColorStop(0.5, '#a855f7');
            coreGradient.addColorStop(1, '#0a0a0f');
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 核心内部代码纹理
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            const codeLines = ['{AI}', '</>', '{}', '[]'];
            codeLines.forEach((line, i) => {
                const y = centerY - 20 + i * 18;
                ctx.fillText(line, centerX, y);
            });
            
            // 环绕的配置文件
            const files = [
                { name: 'IDENTITY', color: '#00d4ff', angle: -Math.PI / 2 },
                { name: 'SOUL', color: '#ec4899', angle: -Math.PI / 2 + Math.PI * 2 / 5 },
                { name: 'AGENTS', color: '#a855f7', angle: -Math.PI / 2 + Math.PI * 4 / 5 },
                { name: 'USER', color: '#3b82f6', angle: -Math.PI / 2 + Math.PI * 6 / 5 },
                { name: 'MEMORY', color: '#22c55e', angle: -Math.PI / 2 + Math.PI * 8 / 5 }
            ];
            
            const orbitRadius = 180;
            files.forEach((file) => {
                const x = centerX + Math.cos(file.angle) * orbitRadius;
                const y = centerY + Math.sin(file.angle) * orbitRadius;
                
                // 连接线
                ctx.strokeStyle = file.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.globalAlpha = 1;
                
                // 文件卡片
                const cardWidth = 100;
                const cardHeight = 40;
                
                // 卡片发光
                const cardGlow = ctx.createRadialGradient(x, y, 0, x, y, cardWidth);
                cardGlow.addColorStop(0, file.color + '40');
                cardGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = cardGlow;
                ctx.fillRect(x - cardWidth/2 - 10, y - cardHeight/2 - 10, cardWidth + 20, cardHeight + 20);
                
                // 卡片背景
                ctx.fillStyle = 'rgba(10, 10, 15, 0.9)';
                ctx.strokeStyle = file.color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight, 8);
                ctx.fill();
                ctx.stroke();
                
                // 文件名
                ctx.fillStyle = file.color;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(file.name, x, y);
            });
            
            // Logo 文字
            ctx.font = 'bold 72px sans-serif';
            ctx.textAlign = 'center';
            
            // Logo 发光效果
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffffff';
            ctx.fillText('ClawSoul', centerX, 100);
            
            // 重置阴影
            ctx.shadowBlur = 0;
            
            // 副标题
            ctx.font = '300 24px sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.fillText('AI 助手配置文件生成器', centerX, 145);
            
            // Slogan
            ctx.font = 'italic 20px sans-serif';
            ctx.fillStyle = '#a855f7';
            ctx.fillText('定制你的 AI 灵魂', centerX, height - 55);
            
            // 底部装饰线
            const lineGradient = ctx.createLinearGradient(centerX - 200, 0, centerX + 200, 0);
            lineGradient.addColorStop(0, 'transparent');
            lineGradient.addColorStop(0.5, '#00d4ff');
            lineGradient.addColorStop(1, 'transparent');
            ctx.strokeStyle = lineGradient;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX - 150, height - 30);
            ctx.lineTo(centerX + 150, height - 30);
            ctx.stroke();
            
            // 角落装饰
            const drawCorner = (x, y, rotation) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 20);
                ctx.lineTo(0, 0);
                ctx.lineTo(20, 0);
                ctx.stroke();
                ctx.restore();
            };
            
            drawCorner(30, 30, 0);
            drawCorner(width - 30, 30, Math.PI / 2);
            drawCorner(width - 30, height - 30, Math.PI);
            drawCorner(30, height - 30, -Math.PI / 2);
            
            // 粒子效果
            for (let i = 0; i < 30; i++) {
                const px = Math.random() * width;
                const py = Math.random() * height;
                const size = Math.random() * 3 + 1;
                const alpha = Math.random() * 0.5 + 0.2;
                
                ctx.fillStyle = `rgba(0, 212, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'clawsoul-cover.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // 绘制封面
        drawCover();
    </script>
</body>
</html>
